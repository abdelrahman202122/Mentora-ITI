              schema:
                type: string
              example: nosniff
            X-DNS-Prefetch-Control:
              schema:
                type: string
              example: "off"
            X-Download-Options:
              schema:
                type: string
              example: noopen
            X-Frame-Options:
              schema:
                type: string
              example: SAMEORIGIN
            X-Permitted-Cross-Domain-Policies:
              schema:
                type: string
              example: none
            X-XSS-Protection:
              schema:
                type: integer
              example: 0
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: http://localhost:3000
            Vary:
              schema:
                type: string
              example: Origin, Accept-Encoding
            Access-Control-Allow-Credentials:
              schema:
                type: boolean
              example: true
            RateLimit-Policy:
              schema:
                type: string
              example: 10;w=900
            RateLimit-Limit:
              schema:
                type: integer
              example: 10
            RateLimit-Remaining:
              schema:
                type: integer
              example: 9
            RateLimit-Reset:
              schema:
                type: integer
              example: 900
            Set-Cookie:
              schema:
                type: string
              example: >-
                refreshToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2YTMxMThmMzA5ZDQ3YThmOTE5OWVlMzUiLCJpYXQiOjE3ODE2MDI1NDcsImV4cCI6MTc4MjIwNzM0N30.pIra1A51zzf8kotCRv_pszulZc9uCV4-yA6JY3M9ZQg;
