openapi: 3.0.0
info:
  title: Mentora
  version: 1.0.0
  description: ''
servers:
  - url: 'http://localhost:4000/'
tags:
  - name: User
  - name: Tutor
  - name: Metadata
  - name: Chats
    description: Authenticated learner-tutor conversations and message history
  - name: Reviews
    description: Verified tutor feedback for completed bookings, including learner-owned review management and public tutor listings
  - name: Payment
    description: Paymob checkout initiation, payment retrieval, and provider webhook handling for booking payments
  - name: Earning
    description: Tutor earnings derived from successful payments, including paginated listing and aggregated summaries
paths:
  /api/users/register:
    post:
      tags:
        - User
      summary: Register
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: tutort
                email: tutort@test.com
                password: '123456'
      responses:
        '201':
          description: Created
          content:
            text/plain:
              schema:
                type: string
              example: |-
                {
                    "success": true,
                    "message": "User registered successfully",
                    "data": {
                        "id": "6a3118f309d47a8f9199ee35",
                        "name": "verina",
                        "email": "verina@test.com",
                        "role": "learner"
                    }
                }
  /api/users/login:
    post:
      tags:
        - User
      summary: Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                email: verina@test.com
                password: '123456'
      security:
        - noauthAuth: []
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
              example: |-
                {
                    "success": true,
                    "data": {
                        "id": "6a3118f309d47a8f9199ee35",
                        "name": "verina",
                        "email": "verina@test.com",
                        "role": "learner"
                    }
                }
  /api/users/refresh-token:
    post:
      tags:
        - User
      summary: Refresh Token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example: ''
      security:
        - noauthAuth: []
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
              example: |-
                {
                    "success": true
                }
  /api/users/logout:
    post:
      tags:
        - User
      summary: Logout
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example: ''
      security:
        - noauthAuth: []
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
              example: |-
                {
