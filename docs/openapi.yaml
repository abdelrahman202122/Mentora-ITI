  /api/chats:
    post:
      operationId: createOrGetChat
      summary: Create or retrieve a chat
      description: Creates a chat between the authenticated learner and an active tutor. If the pair already has a chat, the existing chat is returned and its status is changed back to active.
      tags:
        - Chats
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatRequest'
      responses:
        '200':
          description: Chat created or existing chat returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSuccessResponse'
        '400':
          description: Invalid request body or tutor ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: User is not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only learners can create chats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Active tutor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listChats
      summary: List the authenticated user's chats
      description: Returns the authenticated learner's or tutor's chats, filtered by status and sorted by most recent activity first. Each chat contains a summary of the other participant.
      tags:
        - Chats
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Page number to retrieve
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          required: false
          description: Maximum number of chats returned per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: status
          in: query
          required: false
          description: Chat status to include
          schema:
            type: string
            enum: [active, archived]
            default: active
          example: active
      responses:
        '200':
          description: Chats retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatListSuccessResponse'
        '400':
          description: Invalid pagination or status query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: User is not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only learners and tutors can list chats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/chats/{chatId}/messages:
    get:
      operationId: listChatMessages
      summary: List messages in a chat
      description: Returns non-deleted messages for a chat in chronological order within the requested page. The authenticated learner or tutor must be a participant in the chat.
      tags:
        - Chats
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - name: page
          in: query
          required: false
          description: Page number to retrieve
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          required: false
          description: Maximum number of messages returned per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50
      responses:
        '200':
          description: Messages retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListSuccessResponse'
        '400':
          description: Invalid chat ID or pagination query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: User is not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only learners and tutors can retrieve messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Chat not found or the authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/chats/{chatId}/archive:
    patch:
      operationId: archiveChat
      summary: Archive a chat
      description: Changes a chat's status to archived. The authenticated learner or tutor must be a participant. Repeating the operation is safe and leaves the chat archived.
      tags:
        - Chats
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      responses:
        '200':
          description: Chat archived successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSuccessResponse'
        '400':
          description: Invalid chat ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: User is not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only learners and tutors can archive chats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Chat not found or the authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/health:
    get:
      summary: Health
      responses:
        '200':
          description: Health
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: API is healthy
                  data:
                    type: object
                    required:
                      - status
