      tags:
        - User
      summary: Get Any User's Name and Avatar
      parameters:
        - name: userId
          in: path
          schema:
            type: string
          required: true
          example: 6a3118f309d47a8f9199ee35
      responses:
        '200':
          description: OK
          content:
            text/plain:
