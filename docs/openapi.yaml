    PaymobWebhookPayload:
      type: object
      description: |-
        Raw Paymob transaction processed callback payload. Paymob may send the transaction fields directly at the top level or nested under an `obj` property; both shapes are handled server-side. The HMAC signature is verified over a fixed, ordered subset of these fields concatenated as a string, per Paymob's HMAC specification.
      properties:
        type:
          type: string
          example: TRANSACTION
        obj:
          type: object
          description: Nested transaction object (alternate Paymob callback shape). When absent, the fields below are read from the top level instead.
          properties:
            id:
              type: string
              example: '270150003'
            order:
              type: object
              properties:
                id:
                  type: string
                  example: '288512345'
            amount_cents:
              type: integer
              example: 25000
            currency:
              type: string
              example: EGP
            success:
              type: boolean
              example: true
            pending:
              type: boolean
              example: false
            is_refunded:
              type: boolean
              example: false
            is_voided:
              type: boolean
              example: false
            error_occured:
              type: boolean
              example: false
            integration_id:
              type: integer
              example: 4837291
            special_reference:
              type: string
              description: Internal payment._id passed when creating the Paymob intention
              example: '60c72b2f9b1d8b2a1c8b4572'
            data:
              type: object
              properties:
                message:
                  type: string
                  example: 'Approved'
      example:
        type: TRANSACTION
        obj:
          id: '270150003'
          order:
            id: '288512345'
          amount_cents: 25000
          currency: EGP
          success: true
          pending: false
          is_refunded: false
          is_voided: false
          error_occured: false
          integration_id: 4837291
          special_reference: '60c72b2f9b1d8b2a1c8b4572'
          data:
            message: 'Approved'
