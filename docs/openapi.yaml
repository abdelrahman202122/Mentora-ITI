components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
    noauthAuth:
      type: http
      scheme: noauth
  parameters:
    ChatId:
      name: chatId
      in: path
      required: true
      description: The 24-character hexadecimal MongoDB ObjectId of the chat
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
      example: '60c72b2f9b1d8b2a1c8b4567'
  schemas:
    CreateChatRequest:
      type: object
      additionalProperties: false
      required:
        - tutorId
      properties:
        tutorId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          description: User ID of the active tutor with whom the learner wants to chat
          example: '60c72b2f9b1d8b2a1c8b4569'
    ChatParticipant:
      type: object
      required:
        - id
        - name
        - role
      properties:
        id:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4569'
        name:
          type: string
          example: Ahmed Hassan
        role:
          type: string
          enum: [learner, tutor]
          example: tutor
        avatar:
          type: string
          nullable: true
          example: avatar-1782045981474-730788955.png
    ChatLastMessage:
      type: object
      nullable: true
      properties:
        id:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4570'
        senderId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4568'
        preview:
          type: string
          maxLength: 500
          example: Can you help me with algebra?
        sentAt:
          type: string
          format: date-time
          example: '2026-06-22T10:00:00.000Z'
    Chat:
      type: object
      required:
        - id
        - status
        - participant
        - lastMessage
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4567'
        status:
          type: string
          enum: [active, archived]
          example: active
        participant:
          $ref: '#/components/schemas/ChatParticipant'
