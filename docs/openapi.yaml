  /api/payments/webhook:
    post:
      summary: Paymob Payment Webhook
      description: |-
        Public endpoint (no cookie authentication) that receives asynchronous payment callbacks from Paymob. Authenticity is verified internally via an HMAC-SHA512 signature computed over the Paymob transaction fields and compared against the `hmac` query parameter using a timing-safe comparison.

        On a verified successful transaction, the matching `Payment` is atomically transitioned to `success`, the linked `Booking.paymentStatus` is set to `paid`, a booking confirmation code is generated, and a corresponding `Earning` record is created for the tutor. On a verified failed transaction, the payment is transitioned to `failed` and the booking's `paymentStatus` is set to `failed`. Duplicate or out-of-order callbacks are handled idempotently. This endpoint always responds `200` to acknowledge receipt, regardless of internal processing outcome, to prevent Paymob from retrying indefinitely.
      tags:
        - Payment
      security: []
      parameters:
        - name: hmac
          in: query
          required: true
          schema:
            type: string
          description: HMAC-SHA512 signature of the transaction payload, generated by Paymob using the shared HMAC secret
          example: 'b7f2a1c4d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymobWebhookPayload'
      responses:
        '200':
          description: |-
            Webhook acknowledged. Returned for successfully processed callbacks, duplicate/idempotent callbacks, callbacks referencing an unknown payment, and amount-mismatch callbacks. The HTTP status is always 200 by design so Paymob does not retry; processing outcome is recorded server-side via logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Webhook received
