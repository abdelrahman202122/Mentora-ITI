                        type: string
                        format: date-time
                        example: 2026-06-16T10:58:10.101Z
  /api/bookings:
    post:
      summary: Create Booking Request
      description: Creates a new booking request. Accessible only by learners.
      tags:
        - Bookings
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSuccessResponse'
        '400':
          description: Bad Request (Validation or business rule error)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (User not authenticated or invalid token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (Only learners can create bookings or role check failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (Duplicate booking or tutor not available)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/bookings/me:
    get:
      summary: List My Bookings
      description: Retrieves a paginated list of bookings for the authenticated user (learner or tutor).
      tags:
        - Bookings
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (starts at 1)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
          description: Number of bookings per page
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
          description: Field to sort by
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sorting direction
        - name: bookingStatus
          in: query
          required: false
          schema:
            type: string
            enum: [pending, confirmed, rejected, completed, canceled, expired]
          description: Filter bookings by booking status
        - name: paymentStatus
          in: query
          required: false
          schema:
            type: string
            enum: [unpaid, pending, paid, failed, refunded]
          description: Filter bookings by payment status
        - name: tutorProfileId
          in: query
          required: false
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: Filter bookings by tutor profile ID
        - name: subjectId
          in: query
          required: false
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: Filter bookings by subject ID
      responses:
        '200':
          description: Bookings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListSuccessResponse'
        '400':
          description: Bad Request (Validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/bookings/{bookingId}:
    get:
      summary: Get Booking by ID
      description: Retrieves details of a specific booking. Learners and Tutors can only view bookings they are associated with. Admins can view any booking.
      tags:
        - Bookings
      security:
        - cookieAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4567'
          description: The 24-character hex MongoDB ObjectId of the booking
      responses:
        '200':
          description: Booking retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSuccessResponse'
        '400':
          description: Bad Request (Invalid MongoDB ObjectId format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (User does not have permission to view this booking)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/bookings/{bookingId}/accept:
    patch:
      summary: Accept Booking Request
      description: Accept a pending booking request. Can only be completed by the assigned tutor. Generates a confirmation code.
      tags:
        - Bookings
      security:
        - cookieAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4567'
          description: The 24-character hex MongoDB ObjectId of the booking
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '200':
          description: Booking accepted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingSuccessResponse'
        '400':
          description: Bad Request (Invalid MongoDB ObjectId format, or booking passed start time)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (Only tutors can accept bookings, or the booking does not belong to the tutor)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (Booking status is not pending or has changed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/bookings/{bookingId}/reject:
    patch:
      summary: Reject Booking Request
      description: Reject a pending booking request. Can only be completed by the assigned tutor.
      tags:
        - Bookings
      security:
        - cookieAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4567'
          description: The 24-character hex MongoDB ObjectId of the booking
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
