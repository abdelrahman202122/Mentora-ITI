                $ref: '#/components/schemas/BookingSuccessResponse'
        '400':
          description: Bad Request (Invalid MongoDB ObjectId format, or booking does not have a confirmation code)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (Invalid confirmation code)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (Only tutors can confirm booking completion, or the booking does not belong to the tutor)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (Booking status is not confirmed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
  schemas:
    Booking:
      type: object
      properties:
        _id:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4567'
        learnerId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4568'
        tutorId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4569'
        tutorProfileId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4570'
        subjectId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4571'
        startAt:
          type: string
          format: date-time
          example: '2026-07-20T10:00:00.000Z'
        endAt:
          type: string
          format: date-time
          example: '2026-07-20T11:00:00.000Z'
        durationMinutes:
          type: integer
          minimum: 15
          maximum: 480
          example: 60
        price:
          type: number
          minimum: 0
          example: 150.5
        currency:
          type: string
          enum: [EGP, USD, EUR]
          example: EGP
        bookingStatus:
          type: string
          enum: [pending, confirmed, rejected, completed, canceled, expired]
          example: pending
        paymentStatus:
          type: string
          enum: [unpaid, pending, paid, failed, refunded]
          example: unpaid
        confirmationCode:
          type: string
          nullable: true
          example: 'A1B2C3'
          description: Decrypted confirmation code. Returned for Admin always, for Learner only after payment is paid, and never returned to Tutor.
        confirmationCodeUsedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-20T11:05:00.000Z'
        completedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-20T11:05:00.000Z'
        canceledAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-20T09:00:00.000Z'
        canceledBy:
          type: string
          enum: [tutor, learner]
          nullable: true
          example: learner
        learnerNote:
          type: string
          maxLength: 500
          nullable: true
          example: 'I would like to focus on calculus basics.'
        cancelReason:
          type: string
          maxLength: 500
          nullable: true
          example: 'Sudden emergency arose.'
        paymentId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          nullable: true
          example: '60c72b2f9b1d8b2a1c8b4572'
        reviewId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          nullable: true
          example: '60c72b2f9b1d8b2a1c8b4573'
        createdAt:
          type: string
          format: date-time
          example: '2026-06-19T00:45:00.000Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-06-19T00:46:00.000Z'
    CreateBookingRequest:
      type: object
      required:
        - tutorProfileId
        - subjectId
        - startAt
        - endAt
        - durationMinutes
      properties:
        tutorProfileId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4570'
        subjectId:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
          example: '60c72b2f9b1d8b2a1c8b4571'
        startAt:
          type: string
          format: date-time
          example: '2026-07-20T10:00:00.000Z'
          description: Must be in the future.
        endAt:
          type: string
          format: date-time
          example: '2026-07-20T11:00:00.000Z'
          description: Must be after startAt.
        durationMinutes:
          type: integer
          minimum: 15
          maximum: 480
          example: 60
          description: Must match the startAt and endAt interval.
        learnerNote:
          type: string
          maxLength: 500
          example: 'I would like to focus on calculus basics.'
    CancelBookingRequest:
      type: object
      properties:
        cancelReason:
          type: string
          maxLength: 500
          example: 'Sudden schedule conflict.'
    ConfirmBookingCodeRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 64
          example: 'A1B2C3'
    SuccessResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 'Operation completed successfully.'
    BookingSuccessResponse:
      type: object
      required:
        - success
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 'Booking created successfully'
        data:
          $ref: '#/components/schemas/Booking'
    BookingListSuccessResponse:
      type: object
      required:
        - success
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 'Bookings retrieved successfully'
        data:
          type: object
          required:
            - bookings
            - pagination
          properties:
            bookings:
              type: array
              items:
                $ref: '#/components/schemas/Booking'
            pagination:
              type: object
              required:
                - page
                - limit
                - total
                - totalPages
              properties:
                page:
                  type: integer
                  example: 1
                limit:
                  type: integer
                  example: 10
                total:
                  type: integer
                  example: 15
                totalPages:
                  type: integer
                  example: 2
    ErrorResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'An error occurred'
    ValidationErrorResponse:
      type: object
      required:
        - success
        - message
        - errors
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'Validation error'
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            tutorProfileId:
              - 'Invalid ID format'
            startAt:
              - 'Start time must be in the future'
