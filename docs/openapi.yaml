      tags:
        - User
      summary: Get Avatar Image
      parameters:
        - name: filename
          in: path
          schema:
            type: string
          required: true
          example: avatar-1782045981474-730788955.png
      responses:
        '200':
          description: Successful response
          content:
            image/*:
              schema:
                type: string
                format: binary
  /api/tutors/:
    get:
      tags:
        - Tutor
      summary: List tutors
      description: |
        Returns a paginated list of tutors.

        Supports searching, filtering, sorting, and pagination.

      operationId: listTutors

      parameters:
        - in: query
          name: q
          schema:
            type: string
            minLength: 2
            maxLength: 50
          description: Search by tutor name, headline, bio, or subject.

        - in: query
          name: category
          schema:
            type: string

        - in: query
          name: educationLevel
          schema:
            type: string

        - in: query
          name: curriculum
          schema:
            type: string

        - in: query
          name: minHourlyRate
          schema:
            type: number
            minimum: 0
          description: Minimum hourly rate.

        - in: query
          name: maxHourlyRate
          schema:
            type: number
            minimum: 0
          description: Maximum hourly rate. Must be greater than or equal to minHourlyRate.

        - in: query
          name: minRating
          schema:
            type: number
            minimum: 0
            maximum: 5
          description: Minimum tutor rating (0-5).

        - in: query
          name: languages
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
          description: |
            Filter by teaching languages.

        - in: query
          name: sortBy
          schema:
            type: string
            enum:
              - relevance
              - rating
              - price_asc
              - price_desc
            default: relevance
          description: Sorting method.

        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1

        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20

      responses:
        '200':
          description: Tutors fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Tutors fetched successfully

                  data:
                    type: object
                    properties:
                      tutors:
                        type: array
                        items:
                          $ref: '#/components/schemas/Tutor'

                      pagination:
                        $ref: '#/components/schemas/Pagination'

        '400':
          description: Invalid query parameters
