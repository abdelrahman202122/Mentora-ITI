  /api/payments/checkout:
    post:
      summary: Initiate Checkout
      description: |-
        Initiates a Paymob hosted-checkout session for a confirmed, unpaid booking. Accessible only by the learner who owns the booking.

        The payment amount is always derived server-side from `booking.price` and is never trusted from the client. A local `Payment` record is created with status `pending`, a Paymob payment intention is requested, and the resulting hosted checkout URL is returned to the client along with the local payment ID. The booking is linked to the new payment record.
      tags:
        - Payment
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutRequest'
      responses:
        '201':
          description: Checkout initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSuccessResponse'
        '400':
          description: Bad Request (Validation error, e.g. invalid bookingId format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Unauthorized (User not authenticated or invalid token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (Only learners can initiate checkout, or the booking does not belong to the learner)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (Booking is not confirmed, payment status is not recoverable, or a payment for this booking already exists/is in progress)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error (including Paymob payment gateway errors)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
